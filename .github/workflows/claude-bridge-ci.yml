name: Claude Bridge CI

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "bridges/claude/**"
      - ".github/workflows/claude-bridge-ci.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "bridges/claude/**"
      - ".github/workflows/claude-bridge-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: claude-bridge-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Toolchain
        run: |
          rustc --version
          cargo --version

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test Claude bridge workspace
        run: |
          cargo test --locked \
            -p alleycat-codex-proto \
            -p alleycat-bridge-core \
            -p alleycat-claude-bridge
