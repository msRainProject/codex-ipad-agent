name: iOS CI

on:
  pull_request:
    paths:
      - "ios/MimiRemote/**"
      - "scripts/test-conversation-regressions.sh"
      - "scripts/check-ios-network-security.sh"
      - "scripts/check-ios-privacy-manifest.sh"
      - ".github/workflows/ios-ci.yml"
  push:
    branches:
      - main
    paths:
      - "ios/MimiRemote/**"
      - "scripts/test-conversation-regressions.sh"
      - "scripts/check-ios-network-security.sh"
      - "scripts/check-ios-privacy-manifest.sh"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conversation-regressions:
    # MimiRemote 的最低版本是 iOS 26；macos-26 runner 默认提供稳定版 Xcode 26 和 iOS 26 Simulator。
    runs-on: macos-26
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Show toolchain
        run: |
          go version
          xcodebuild -version
          xcrun simctl list devices available

      - name: Check network security policy
        run: bash ./scripts/check-ios-network-security.sh

      - name: Check privacy manifest
        run: bash ./scripts/check-ios-privacy-manifest.sh

      - name: Run core regressions
        run: bash ./scripts/test-conversation-regressions.sh
