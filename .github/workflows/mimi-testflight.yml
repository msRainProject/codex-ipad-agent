name: Mimi TestFlight 内测

on:
  push:
    branches: [main]
    paths:
      - 'ios/MimiRemote/**'
      - 'scripts/check-ios-privacy-manifest.sh'
      - '.github/workflows/mimi-testflight.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 要发布的 Git commit、tag 或分支
        required: true
        default: main
        type: string
      what_to_test:
        description: TestFlight 的“测试内容”
        required: true
        type: string
      xcode_path:
        description: 可选 Xcode 路径
        required: false
        default: /Applications/Xcode-beta.app
        type: string

permissions:
  contents: read

concurrency:
  group: mimi-testflight
  cancel-in-progress: false

jobs:
  publish:
    # 仓库专用标签防止其他项目占用本机的 iOS 发布环境。
    runs-on: [self-hosted, macOS, ARM64, mimi-testflight]
    timeout-minutes: 90
    env:
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID }}
      DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
      TESTFLIGHT_BETA_GROUP_NAME: ${{ vars.TESTFLIGHT_BETA_GROUP_NAME }}
      TESTFLIGHT_BETA_GROUP_ID: ${{ vars.TESTFLIGHT_BETA_GROUP_ID }}
      TESTFLIGHT_WHATS_NEW: ${{ inputs.what_to_test || format('自动内测：{0}', github.event.head_commit.message) }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
      IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      IOS_APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      XCODE_APP_PATH: ${{ inputs.xcode_path || '/Applications/Xcode-beta.app' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: 准备临时 App Store Connect Key
        run: |
          set -euo pipefail
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$ASC_PRIVATE_KEY"
          asc_key="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          # 核心逻辑：从 GitHub Secret 生成本次任务专用文件，避免持久 Runner 依赖个人机器路径。
          printf '%s' "$ASC_PRIVATE_KEY" > "$asc_key"
          chmod 600 "$asc_key"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$asc_key" >> "$GITHUB_ENV"

      - name: 检查本机发布环境
        run: |
          set -euo pipefail

          # 持久 runner 不修改系统 xcode-select，避免并发任务互相影响。
          developer_dir="$XCODE_APP_PATH/Contents/Developer"
          test -d "$developer_dir"
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$developer_dir"
          xcodebuild -version
          xcrun altool --version

          test -n "$IOS_BUNDLE_ID"
          test -n "$DEVELOPMENT_TEAM"
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_API_ISSUER_ID"
          test -f "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: 检查 App 隐私清单
        run: bash ./scripts/check-ios-privacy-manifest.sh

      - name: 准备临时发布钥匙串
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/mimi-signing.keychain-db"
          original_keychains="$RUNNER_TEMP/mimi-original-keychains.txt"
          certificate="$RUNNER_TEMP/mimi-distribution.p12"
          profile="$RUNNER_TEMP/mimi-appstore.mobileprovision"
          profile_plist="$RUNNER_TEMP/mimi-appstore.plist"

          # 先记录所有清理路径，确保中途失败时 always 步骤仍能恢复持久 runner。
          {
            echo "IOS_SIGNING_KEYCHAIN_PATH=$keychain"
            echo "IOS_ORIGINAL_KEYCHAINS_FILE=$original_keychains"
            echo "IOS_SIGNING_CERTIFICATE_PATH=$certificate"
            echo "IOS_SIGNING_PROFILE_PATH=$profile"
            echo "IOS_SIGNING_PROFILE_PLIST_PATH=$profile_plist"
          } >> "$GITHUB_ENV"

          security list-keychains -d user \
            | sed -E 's/^[[:space:]]*"([^"]+)"[[:space:]]*$/\1/' \
            > "$original_keychains"
          ruby -rbase64 -e 'File.binwrite(ARGV[0], Base64.decode64(ENV.fetch("IOS_DISTRIBUTION_CERTIFICATE_BASE64")))' "$certificate"
          ruby -rbase64 -e 'File.binwrite(ARGV[0], Base64.decode64(ENV.fetch("IOS_APPSTORE_PROVISIONING_PROFILE_BASE64")))' "$profile"

          security delete-keychain "$keychain" 2>/dev/null || true
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 7200 "$keychain"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$keychain"
          security import "$certificate" \
            -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$keychain"
          # 核心逻辑：显式授权 Apple 工具链访问私钥，避免后台 runner 在 CodeSign 时出现 errSecInternalComponent。
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$IOS_KEYCHAIN_PASSWORD" \
            "$keychain"

          original_search_list=()
          while IFS= read -r keychain_path; do
            if [[ -n "$keychain_path" && "$keychain_path" != "$keychain" ]]; then
              original_search_list+=("$keychain_path")
            fi
          done < "$original_keychains"
          # 临时 keychain 排在最前，但保留登录与系统 keychain，避免影响同机其他构建。
          security list-keychains -d user -s "$keychain" "${original_search_list[@]}"

          signing_identity="$(
            security find-identity -v -p codesigning "$keychain" \
              | sed -nE 's/.*"((Apple|iPhone) Distribution:[^"]+)".*/\1/p' \
              | head -n 1
          )"
          if [[ -z "$signing_identity" || "$signing_identity" != *"($DEVELOPMENT_TEAM)" ]]; then
            echo "临时 keychain 中没有团队 $DEVELOPMENT_TEAM 的 Distribution 签名身份" >&2
            exit 1
          fi

          security cms -D -i "$profile" > "$profile_plist"
          application_identifier="$(plutil -extract Entitlements.application-identifier raw -o - "$profile_plist")"
          if [[ "$application_identifier" != "$DEVELOPMENT_TEAM.$IOS_BUNDLE_ID" ]] \
            || plutil -extract ProvisionedDevices xml1 -o - "$profile_plist" >/dev/null 2>&1; then
            echo "Provisioning profile 不是 $IOS_BUNDLE_ID 的 App Store profile" >&2
            exit 1
          fi
          profile_uuid="$(plutil -extract UUID raw -o - "$profile_plist")"
          profile_name="$(plutil -extract Name raw -o - "$profile_plist")"
          installed_profile="$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"
          mkdir -p "$(dirname "$installed_profile")"
          cp "$profile" "$installed_profile"
          {
            echo "IOS_CODE_SIGN_IDENTITY=$signing_identity"
            echo "IOS_PROVISIONING_PROFILE_SPECIFIER=$profile_name"
            echo "IOS_INSTALLED_PROFILE_PATH=$installed_profile"
          } >> "$GITHUB_ENV"

      - name: 归档并导出 IPA
        run: |
          set -euo pipefail
          build_number="$((100000 + GITHUB_RUN_NUMBER))"
          marketing_version="1.0"
          output="$RUNNER_TEMP/mimi-$marketing_version-$build_number"
          archive="$output/MimiRemote.xcarchive"
          export_path="$output/export"
          export_options="$output/ExportOptions.plist"
          # 先记录输出目录，即使归档失败，always 步骤也能清理。
          echo "IOS_OUTPUT_PATH=$output" >> "$GITHUB_ENV"
          mkdir -p "$output"
          cat > "$export_options" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>manageAppVersionAndBuildNumber</key><false/>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$DEVELOPMENT_TEAM</string>
            <key>provisioningProfiles</key>
            <dict><key>$IOS_BUNDLE_ID</key><string>$IOS_PROVISIONING_PROFILE_SPECIFIER</string></dict>
          </dict>
          </plist>
          PLIST
          xcodebuild archive \
            -project ios/MimiRemote/MimiRemote.xcodeproj \
            -scheme MimiRemote \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$archive" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            MARKETING_VERSION="$marketing_version" \
            CURRENT_PROJECT_VERSION="$build_number" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_SPECIFIER" \
            OTHER_CODE_SIGN_FLAGS="--keychain $IOS_SIGNING_KEYCHAIN_PATH" \
            -quiet
          xcodebuild -exportArchive \
            -archivePath "$archive" \
            -exportPath "$export_path" \
            -exportOptionsPlist "$export_options" \
            -quiet
          ipa="$export_path/MimiRemote.ipa"
          test -f "$ipa"
          echo "IOS_IPA_PATH=$ipa" >> "$GITHUB_ENV"
          echo "IOS_MARKETING_VERSION=$marketing_version" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=$build_number" >> "$GITHUB_ENV"

      - name: 上传到 App Store Connect
        run: |
          set -euo pipefail
          # 使用 Xcode 自带的上传器，避免在持久 runner 上维护全局 fastlane/Ruby 环境。
          xcrun altool --upload-app \
            --file "$IOS_IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --p8-file-path "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: 精确分发到咪咪 Internal
        run: |
          set -euo pipefail
          ruby scripts/distribute_internal_build.rb "$IOS_IPA_PATH"

      - name: 清理本地构建产物
        if: ${{ always() }}
        run: |
          set -uo pipefail
          cleanup_status=0

          # 核心逻辑：先恢复任务前的搜索列表，再删除临时 keychain，不能给持久 runner 留下失效路径。
          original_keychains="${IOS_ORIGINAL_KEYCHAINS_FILE:-$RUNNER_TEMP/mimi-original-keychains.txt}"
          if [[ -f "$original_keychains" ]]; then
            original_search_list=()
            while IFS= read -r keychain_path; do
              [[ -n "$keychain_path" ]] && original_search_list+=("$keychain_path")
            done < "$original_keychains"
            if (( ${#original_search_list[@]} > 0 )); then
              security list-keychains -d user -s "${original_search_list[@]}" || cleanup_status=1
            else
              echo "原始 keychain 搜索列表为空，拒绝覆盖当前列表" >&2
              cleanup_status=1
            fi
          fi

          security delete-keychain \
            "${IOS_SIGNING_KEYCHAIN_PATH:-$RUNNER_TEMP/mimi-signing.keychain-db}" \
            2>/dev/null || true
          rm -f \
            "${APP_STORE_CONNECT_API_KEY_PATH:-$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8}" \
            "${IOS_INSTALLED_PROFILE_PATH:-}" \
            "${IOS_SIGNING_CERTIFICATE_PATH:-$RUNNER_TEMP/mimi-distribution.p12}" \
            "${IOS_SIGNING_PROFILE_PATH:-$RUNNER_TEMP/mimi-appstore.mobileprovision}" \
            "${IOS_SIGNING_PROFILE_PLIST_PATH:-$RUNNER_TEMP/mimi-appstore.plist}" \
            "$original_keychains"
          # 只删除本次在 RUNNER_TEMP 中生成的目录，避免持久机磁盘累积。
          if [[ -n "${IOS_OUTPUT_PATH:-}" && "$IOS_OUTPUT_PATH" == "$RUNNER_TEMP"/mimi-* ]]; then
            rm -rf "$IOS_OUTPUT_PATH"
          fi
          exit "$cleanup_status"
