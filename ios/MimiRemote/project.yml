name: MimiRemote
options:
  bundleIdPrefix: com.gaixianggeng
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown
    from: "0.8.0"
targets:
  MimiRemote:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gaixianggeng.mimi
        PRODUCT_NAME: MimiRemote
        PRODUCT_MODULE_NAME: MimiRemote
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        CURRENT_PROJECT_VERSION: "12"
        MARKETING_VERSION: "1.0"
  MimiRemoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: MimiRemote
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gaixianggeng.mimiTests
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MimiRemote.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/MimiRemote"
        BUNDLE_LOADER: "$(TEST_HOST)"
